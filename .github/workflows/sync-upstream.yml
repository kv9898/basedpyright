name: Sync Fork with Upstream (Rebase)

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 03:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Sync with upstream (rebase)
        uses: zhangnew/sync-upstream@v1
        with:
          upstream: DetachHead/basedpyright
          upstream-branch: main
          branch: main
